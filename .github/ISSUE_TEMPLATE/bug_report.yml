name: Bug report
description: Report a defect in Clawdroid
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题摘要
      description: 简要说明问题现象。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 尽量提供稳定复现步骤。
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: Android 版本、ROM、Root 方案、LSPosed 状态、模块管理器版本等。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请勿提交真实共享密钥、敏感截图或未公开的高危安全细节。
